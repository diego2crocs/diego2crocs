name: Generate Snake Animation

on:
  # Lance l'action tous les jours à minuit
  schedule:
    - cron: "0 0 * * *"
  
  # Permet de lancer manuellement l'action
  workflow_dispatch:
  
  # Lance à chaque push sur la branche main
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Génère le snake à partir de tes contributions GitHub
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: diego2crocs
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      
      # Pousse les fichiers générés dans la branche output
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
